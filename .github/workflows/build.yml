name: Build & Push

# Single workflow for all three modules.
# The `changes` job uses dorny/paths-filter to detect which module(s)
# actually changed; downstream build jobs only run when their module changed.
# Pushing a change to mcp-client/ will NOT trigger mcp-server or pr-review-agent builds.

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      module:
        description: "Force-build a specific module (mcp-server | mcp-client | pr-review-agent | all)"
        required: false
        default: "all"

# ── 1. Detect changed modules ─────────────────────────────────────────────────
jobs:
  changes:
    name: Detect changed modules
    runs-on: ubuntu-latest
    outputs:
      mcp-server:      ${{ steps.filter.outputs.mcp-server }}
      mcp-client:      ${{ steps.filter.outputs.mcp-client }}
      pr-review-agent: ${{ steps.filter.outputs.pr-review-agent }}
    steps:
      - uses: actions/checkout@v4

      - name: Path filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            mcp-server:
              - 'mcp-server/**'
            mcp-client:
              - 'mcp-client/**'
            pr-review-agent:
              - 'pr-review-agent/**'

  # ── 2a. mcp-server ────────────────────────────────────────────────────────
  build-mcp-server:
    name: mcp-server · Build & Test
    needs: changes
    if: >
      needs.changes.outputs.mcp-server == 'true'
      || (github.event_name == 'workflow_dispatch'
          && (github.event.inputs.module == 'mcp-server' || github.event.inputs.module == 'all'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Build & test
        working-directory: mcp-server
        run: mvn verify --no-transfer-progress
      - uses: actions/upload-artifact@v4
        with:
          name: mcp-server-jar
          path: mcp-server/target/*.jar
          if-no-files-found: error

  docker-mcp-server:
    name: mcp-server · Docker Push
    needs: build-mcp-server
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/mcp-server
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
      - uses: docker/build-push-action@v6
        with:
          context: mcp-server
          file: mcp-server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2b. mcp-client ────────────────────────────────────────────────────────
  build-mcp-client:
    name: mcp-client · Build & Test
    needs: changes
    if: >
      needs.changes.outputs.mcp-client == 'true'
      || (github.event_name == 'workflow_dispatch'
          && (github.event.inputs.module == 'mcp-client' || github.event.inputs.module == 'all'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Build & test
        working-directory: mcp-client
        run: mvn verify --no-transfer-progress
      - uses: actions/upload-artifact@v4
        with:
          name: mcp-client-jar
          path: mcp-client/target/*.jar
          if-no-files-found: error

  docker-mcp-client:
    name: mcp-client · Docker Push
    needs: build-mcp-client
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/mcp-client
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
      - uses: docker/build-push-action@v6
        with:
          context: mcp-client
          file: mcp-client/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2c. pr-review-agent ───────────────────────────────────────────────────
  build-pr-review-agent:
    name: pr-review-agent · Build & Test
    needs: changes
    if: >
      needs.changes.outputs.pr-review-agent == 'true'
      || (github.event_name == 'workflow_dispatch'
          && (github.event.inputs.module == 'pr-review-agent' || github.event.inputs.module == 'all'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Build & test
        working-directory: pr-review-agent
        run: mvn verify --no-transfer-progress
      - uses: actions/upload-artifact@v4
        with:
          name: pr-review-agent-jar
          path: pr-review-agent/target/*.jar
          if-no-files-found: error

  docker-pr-review-agent:
    name: pr-review-agent · Docker Push
    needs: build-pr-review-agent
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/pr-review-agent
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
      - uses: docker/build-push-action@v6
        with:
          context: pr-review-agent
          file: pr-review-agent/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
