spring.application.name=mcp-client
server.port=3002

# ── MCP Server connection (SSE transport) ────────────────────────────────────
# Points to the mcp-server module running on port 3001.
# The Spring AI MCP client auto-configuration reads this and creates a
# McpSyncClient bean that the OrchestrationService injects.
spring.ai.mcp.client.sse.connections.mcp-server.url=http://localhost:3001

# Expose the server URL as an app property for the info endpoint
mcp.server.url=http://localhost:3001

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
