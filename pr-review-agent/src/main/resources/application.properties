spring.application.name=pr-review-agent
server.port=3003

# ── Azure AI Foundry ──────────────────────────────────────────────────────────
# Set these as environment variables or in application-local.properties (git-ignored)
azure.ai.endpoint=${AZURE_AI_ENDPOINT:https://YOUR_PROJECT.services.ai.azure.com/models}
azure.ai.key=${AZURE_AI_KEY:your-azure-ai-key}
azure.ai.model=${AZURE_AI_MODEL:gpt-4o}

# ── GitHub ────────────────────────────────────────────────────────────────────
# GitHub Personal Access Token with repo read scope
# Required by the @modelcontextprotocol/server-github MCP server
github.token=${GITHUB_TOKEN:your-github-pat}

# ── Swagger UI ────────────────────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.display-request-duration=true

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.example.prreview=INFO
